<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Prads Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #273548;
      --border:   #334155;
      --accent:   #6366f1;
      --accent-h: #818cf8;
      --user-bg:  #3730a3;
      --bot-bg:   #1e293b;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --source:   #0ea5e9;
      --radius:   14px;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      background: rgba(15,23,42,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p  { font-size: 12px; color: var(--muted); }
    .back-link {
      font-size: 13px; color: var(--muted); text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      margin-left: auto; margin-right: 16px;
      transition: color .15s;
    }
    .back-link:hover { color: var(--text); }
    .status-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,.25);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Chat wrap ── */
    .chat-wrap {
      width: 100%; max-width: 760px;
      flex: 1; display: flex; flex-direction: column;
      padding: 0 16px 24px;
    }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 0 16px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; max-width: 88%; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .msg.user .msg-avatar { background: var(--user-bg); color: #c7d2fe; }
    .msg.bot  .msg-avatar { background: linear-gradient(135deg,var(--accent),#a855f7); color:#fff; }

    .bubble {
      padding: 11px 15px; border-radius: var(--radius); line-height: 1.65; font-size: 14.5px;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: var(--user-bg); color: #e0e7ff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* typing */
    .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.30s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Questions panel ── */
    #questions-panel { display: flex; flex-direction: column; gap: 20px; }

    .category-block { display: flex; flex-direction: column; gap: 8px; }
    .category-label {
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted);
      padding-left: 2px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 8px 16px; border-radius: 20px; font-size: 13.5px; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      transition: border-color .15s, background .15s, transform .1s;
      line-height: 1.3;
    }
    .chip:hover {
      border-color: var(--accent); background: var(--surface2); transform: translateY(-1px);
    }

    /* ── Reset bar ── */
    #reset-bar {
      display: none;
      padding: 4px 0 0;
    }
    .reset-btn {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); font-size: 13px; padding: 7px 16px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: border-color .15s, color .15s;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Footer ── */
    .footer-note {
      font-size: 11px; color: var(--muted); text-align: center; padding-top: 10px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-avatar">P</div>
    <div class="header-info">
      <h1>Prads Bot</h1>
      <p>Tap a question to learn about Pradeep's work and background</p>
    </div>
    <a href="https://pradeepunair.me" class="back-link">← Back to site</a>
    <div class="status-wrap">
      <span class="status-dot"></span> Online
    </div>
  </header>

  <div class="chat-wrap">
    <div id="messages">
      <!-- Populated by JS -->
    </div>

    <div id="reset-bar">
      <button class="reset-btn" onclick="resetToQuestions()">
        ← Ask another question
      </button>
    </div>

    <p class="footer-note">Powered by Claude AI · Only shares info from pradeepunair.me</p>
  </div>

  <script src="qa-data.js"></script>
  <script>
    const msgs   = document.getElementById('messages');
    const resetBar = document.getElementById('reset-bar');
    let panel    = null;   // the questions panel DOM node
    let answering = false;

    // ── Init ──────────────────────────────────────────────────────────
    function init() {
      addBotMsg(QA_DATA.greeting);
      panel = buildQuestionsPanel();
      msgs.appendChild(panel);
      scrollBottom();
    }

    // ── Build question chips ──────────────────────────────────────────
    function buildQuestionsPanel() {
      const container = document.createElement('div');
      container.id = 'questions-panel';

      QA_DATA.categories.forEach(cat => {
        const block = document.createElement('div');
        block.className = 'category-block';

        const label = document.createElement('div');
        label.className = 'category-label';
        label.textContent = cat.label;
        block.appendChild(label);

        const chips = document.createElement('div');
        chips.className = 'chips';
        cat.questions.forEach(qa => {
          const chip = document.createElement('button');
          chip.className = 'chip';
          chip.textContent = qa.q;
          chip.onclick = () => handleQuestion(qa);
          chips.appendChild(chip);
        });

        block.appendChild(chips);
        container.appendChild(block);
      });

      return container;
    }

    // ── Handle chip click ─────────────────────────────────────────────
    async function handleQuestion(qa) {
      if (answering) return;
      answering = true;

      // Hide questions panel
      if (panel) panel.style.display = 'none';
      resetBar.style.display = 'none';

      // User bubble
      addUserMsg(qa.q);
      scrollBottom();

      // Typing indicator
      const typingEl = addTyping();
      scrollBottom();

      // Simulate a short delay (realistic feel)
      await delay(650);

      // Remove typing, add answer
      typingEl.remove();
      addBotMsg(qa.a);
      scrollBottom();

      // Show reset bar
      resetBar.style.display = 'block';
      answering = false;
    }

    // ── Reset to question chips ───────────────────────────────────────
    function resetToQuestions() {
      // Remove all messages except the first (greeting)
      const allMsgs = [...msgs.querySelectorAll('.msg')];
      allMsgs.slice(1).forEach(el => el.remove());

      // Re-show panel (rebuild if needed)
      if (panel && panel.parentNode === msgs) {
        panel.style.display = 'flex';
      } else {
        panel = buildQuestionsPanel();
        msgs.appendChild(panel);
      }

      resetBar.style.display = 'none';
      msgs.scrollTop = 0;
    }

    // ── DOM helpers ───────────────────────────────────────────────────
    function addBotMsg(text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.innerHTML = `
        <div class="msg-avatar">AI</div>
        <div><div class="bubble">${escHtml(text)}</div></div>`;
      msgs.appendChild(wrap);
      return wrap;
    }

    function addUserMsg(text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg user';
      wrap.innerHTML = `
        <div class="msg-avatar">You</div>
        <div><div class="bubble">${escHtml(text)}</div></div>`;
      msgs.appendChild(wrap);
      return wrap;
    }

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.innerHTML = `
        <div class="msg-avatar">AI</div>
        <div><div class="bubble"><div class="typing">
          <span></span><span></span><span></span>
        </div></div></div>`;
      msgs.appendChild(wrap);
      return wrap;
    }

    function scrollBottom() {
      msgs.scrollTop = msgs.scrollHeight;
    }

    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    init();
  </script>
</body>
</html>
